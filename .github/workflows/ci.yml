name: CI

on:
  push:
    branches: ["main", "master", "work"]
  pull_request:

jobs:
  test-and-build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run unit tests
        run: |
          cd Lucid
          swift test

      - name: Verify app bundle script
        run: |
          cd Lucid
          ./build-app.sh debug
